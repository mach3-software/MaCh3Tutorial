# This scans MaCh3 and tries to find vulnerabilities

name: "CodeQL C++ Analysis"

on:
  schedule:
    - cron: '0 0 * * 1' # KS: Every Monday at midnight to not disturb during weekend...

jobs:
  analyze:
    name: Analyze C++ Code with CodeQL
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/mach3-software/mach3:alma9v1.3.0
    permissions:
      security-events: write
      packages: read
      actions: read
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Initialize CodeQL
        uses: github/codeql-action/init@0337b99474cc604cc1c4737c1b419e6fb618172e  # v4.36.2
        with:
          languages: c-cpp
          build: none  # Specify build none to skip any build steps

      - name: Build Code
        run: |
          mkdir build
          cd build
          cmake ../ -DMaCh3_Branch=develop
          make

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@0337b99474cc604cc1c4737c1b419e6fb618172e  # v4.36.2
